name: Build BlankOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write # Required to automatically create a Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nasm gnu-efi mtools xorriso jq

      - name: Compile OS and Generate ISO
        run: |
          make iso

      - name: Parse Version and Changelog
        id: os_info
        run: |
          VERSION_MAJOR=$(jq -r '.version_major' version.json)
          VERSION_MINOR=$(jq -r '.version_minor' version.json)
          VERSION_PATCH=$(jq -r '.version_patch' version.json)
          VERSION="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          
          # Get the most recent changelog from array
          CHANGELOG=$(jq -r '.update_logs[0]' version.json)
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blankOS-iso
          path: blankOS.iso

      - name: Auto-Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: BlankOS Release ${{ env.VERSION }}
          body: |
            **Automated Release generated by GitHub Actions.**
            
            ## Changelog
            ${{ env.CHANGELOG }}
            
            ## Installation Instructions
            1. Download the `blankOS.iso` file attached below.
            2. Load the ISO into a virtual machine like VirtualBox, VMware, or QEMU.
            3. *Optional*: Use the included `BlankOS.vbox` or `BlankOS.vmx` templates from the repo to auto-configure your VM.
            4. Boot up the machine. The BlankOS Setup Application will guide you! (Supports both UEFI and Legacy BIOS)
            
            *Minimum Requirements: 2GB RAM, 20GB Storage, 64-bit CPU.*
          files: blankOS.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
